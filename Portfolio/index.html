<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio</title>
    <style>
      :root {
        color: #171717;
        background: #f7f5f0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(720px, 100%);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(40px, 8vw, 84px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 560px;
        color: #4a4a4a;
        font-size: 20px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Portfolio</h1>
      <p>Site en cours de construction.</p>
    </main>
  </body>
</html>
